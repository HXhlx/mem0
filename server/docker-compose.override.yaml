# Auto-generated by self-mem0/apply.sh — safe to edit, do not commit.
# Mounts the self-mem0 package and prepends it to PYTHONPATH so the
# try/except import hooks in server/main.py and server/auth.py succeed.
# Postgres data moved from named volume → /data/mem0/postgres bind mount.
services:
  mem0:
    volumes:
      - ../self-mem0:/app/self-mem0:ro
    environment:
      - PYTHONPATH=/app/self-mem0:/app
  postgres:
    ports:
      - "5432:5432"
    volumes:
      - /data/postgres:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
  mem0-mcp:
    build:
      context: ../mem0-mcp
    ports:
      - "9003:9003"
    networks:
      - mem0_network
    environment:
      - MEM0_API_KEY=${ADMIN_API_KEY}
      - MEM0_HOST=http://mem0:8000
      - MCP_TRANSPORT=combined
      - MCP_PORT=9003
      - MCP_HOST=0.0.0.0
    depends_on:
      mem0:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9003/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
